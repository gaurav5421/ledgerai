[project]
user_env = []
session_timeout = 3600
user_session_timeout = 1296000
cache = false
persist_user_env = false
mask_user_env = false
allow_origins = ["*"]

[features]
unsafe_allow_html = false
latex = false
user_message_markdown = true
user_message_autoscroll = true
assistant_message_autoscroll = true
auto_tag_thread = true
edit_message = true
allow_thread_sharing = false
favorites = false

[features.spontaneous_file_upload]
    enabled = false

[features.audio]
    enabled = false

[features.mcp]
    enabled = false

[UI]
name = "LedgerAI"
description = "AI-powered financial analysis agent using SEC EDGAR filings"
default_theme = "dark"
layout = "wide"
cot = "hidden"
custom_css = "/public/style.css"
confirm_new_chat = true
alert_style = "classic"
logo_file_url = ""
default_avatar_file_url = ""

[[UI.header_links]]
    name = "GitHub"
    display_name = "GitHub"
    icon_url = "/public/icons/chart.svg"
    url = "https://github.com/gauravsureka/LedgerAI"
    target = "_blank"

[meta]
generated_by = "2.10.0"
